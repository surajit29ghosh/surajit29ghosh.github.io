<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
        var segmentCount = 0;
        var l = window.location;
        l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
            encodeURIComponent(l.pathname.substr(1) + l.search + l.hash));
    </script>
</head>
<body>
</body>
</html>
